name: Quarto Publish

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Check spelling
        uses: crate-ci/typos@v1.47.2
        continue-on-error: true

      - name: Check markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: |
            **/*.qmd
            **/*.md
        continue-on-error: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2.2.0
        with:
          tinytex: false

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::jsonlite
            any::pwr
            any::WebPower
            any::Superpower

      - name: Render Quarto project
        uses: quarto-dev/quarto-actions/render@v2.2.0

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: quarto-preview-pr-${{ github.event.pull_request.number }}
          path: docs/
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
